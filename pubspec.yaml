name: floq
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase packages
  #  firebase_core: ^4.3.0
  #  firebase_auth: ^6.1.3
  #  cloud_firestore: ^6.1.1


  # UI & other packages
  animated_text_kit: ^4.2.2

  google_fonts: ^6.3.3
  cupertino_icons: ^1.0.8
  emoji_picker_flutter: 2.1.1
  intl: ^0.18.1
  image_picker: ^0.8.7+5
  file_picker: ^8.1.3
  geolocator: ^10.1.1
  flutter_contacts: ^1.1.9
  permission_handler: ^11.4.0
  package_info_plus: ^4.0.0
  url_launcher: ^6.1.10
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  http: ^1.6.0
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  socket_io_client: ^3.1.4
  flutter_animate: ^4.5.2
  glassmorphism: ^3.0.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  google_sign_in: ^7.2.0
  firebase_auth: ^6.4.0
  photo_manager: ^3.9.0
  photo_manager_image_provider: any
  geocoding: ^4.0.0
  video_player: ^2.11.1
  camera: ^0.12.0+1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mockito: ^5.4.4

dependency_overrides:
  path_provider_foundation: 2.3.2
  shared_preferences_foundation: 2.3.5
  objective_c: 1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/1.jpg
    - assets/2.jpg
    - assets/3.jpg
    - assets/4.jpg
    - assets/5.jpg
    - assets/icon.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"  # replace with your image
