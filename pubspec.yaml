name: chatapplication
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase packages
  #  firebase_core: ^4.3.0
  #  firebase_auth: ^6.1.3
  #  cloud_firestore: ^6.1.1


  # UI & other packages
  animated_text_kit: ^4.2.2

  google_fonts: ^6.3.3
  cupertino_icons: ^1.0.8
  emoji_picker_flutter: 2.1.1
  intl: ^0.18.1
  image_picker: ^0.8.7+5
  file_picker: ^10.3.8
  geolocator: ^10.1.1
  flutter_contacts: ^1.1.9
  permission_handler: ^11.4.0
  package_info_plus: ^4.0.0
  url_launcher: ^6.1.10
  
  # Network & Storage
  http: ^1.1.0
  socket_io_client: ^2.0.3+1
  shared_preferences: ^2.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/1.jpg
    - assets/2.jpg
    - assets/3.jpg
    - assets/4.jpg
    - assets/5.jpg

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"  # replace with your image
